[package]
name = "claude-sentinel"
version = "0.1.0"
description = "Claude Sentinel — multi-account manager and overage alerts for Claude Code"
authors = ["Jeff Wooden"]
license = "MIT"
repository = "https://github.com/Intevity/claude-sentinel"
edition = "2021"
rust-version = "1.77"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "devtools"] }
tauri-plugin-single-instance = "2"
tauri-plugin-notification = "2"
tauri-plugin-store = "2"
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
image = { version = "0.25", default-features = false, features = ["png"] }
# Sprint 2: handshake-token generation for IPC peer auth.
rand = "0.8"
hex = "0.4"

[target.'cfg(target_os = "windows")'.dependencies]
# Tray auto-pin: reads/writes HKCU\Control Panel\NotifyIconSettings.
# First-party Microsoft crate; its windows-* transitive deps are already
# in the tree via tauri, so the compile cost is near zero.
windows-registry = "0.5"
# The same crate notify-rust drives winrt toasts with (already in the tree
# via tauri-plugin-notification); used directly only to validate alert
# sound names before delivery — see display_alert_notification.
tauri-winrt-notification = "0.7"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
block2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSUserNotification",
    "NSString",
    "NSDictionary",
    "NSObject",
    "NSArray",
    "NSThread",
    "NSValue",
    "NSNotification",
    "NSOperation",
    "block2",
] }
objc2-app-kit = { version = "0.3", features = [
    "NSApplication",
    "NSResponder",
] }

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
