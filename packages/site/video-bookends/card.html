<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sentinel clip outro</title>
    <link rel="stylesheet" href="./bookend.css" />
    <link rel="stylesheet" href="./cards.css" />
  </head>
  <body>
    <div class="stage" id="stage">
      <div class="bg-gradient"></div>
      <div class="bg-aurora"></div>
      <div class="bg-grid"></div>

      <div class="card">
        <div class="icon-tile" id="tile"></div>
        <h1 class="takeaway" id="takeaway"></h1>
        <div class="brand-lockup">
          <div class="brand-row">
            <img src="../public/sentinel-mascot.png" alt="" />
            <span class="name">Sentinel</span>
          </div>
          <span class="url">intevity.github.io/sentinel</span>
        </div>
      </div>

      <div class="replay-hint">Reload to replay</div>
    </div>

    <script>
      // Lucide icon inner-paths, copied from src/components/Icon.astro so the
      // outro icons match the site exactly.
      const ICONS = {
        shield:
          '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
        rotate:
          '<path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>',
        gauge: '<path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/>',
        bell: '<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
        chart:
          '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
        sparkles:
          '<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>',
        lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
        users:
          '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
        wallet:
          '<path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 1-1 1H5a2 2 0 0 1-2-2V6"/>',
        scan: '<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/><path d="m16 16-1.9-1.9"/>',
        'list-checks':
          '<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>',
        bot: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
        fold: '<path d="M12 22v-6"/><path d="M12 8V2"/><path d="M4 12H2"/><path d="M10 12H8"/><path d="M16 12h-2"/><path d="M22 12h-2"/><path d="m15 19-3-3-3 3"/><path d="m15 5-3 3-3-3"/>',
        braces:
          '<path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5a2 2 0 0 1 2-2 2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/>',
      };

      // Per-clip outro: feature icon + one-line takeaway + accent.
      const CARDS = {
        security: { icon: 'shield', accent: '#5e5ce6', takeaway: 'See it. Gate it. Contain it.' },
        optimize: { icon: 'sparkles', accent: '#32d74b', takeaway: 'Same work. Fewer tokens.' },
        accounts: { icon: 'rotate', accent: '#007aff', takeaway: 'Every account, one click away.' },
        usage: { icon: 'gauge', accent: '#007aff', takeaway: 'Every limit, before it bites.' },
        alerts: { icon: 'bell', accent: '#ff9f0a', takeaway: 'Never get surprised by a limit.' },
        metrics: {
          icon: 'chart',
          accent: '#007aff',
          takeaway: 'Every session, not just this one.',
        },
        switching: { icon: 'rotate', accent: '#007aff', takeaway: 'Hands off the account switch.' },
        pool: { icon: 'users', accent: '#007aff', takeaway: 'Every plan, side by side.' },
        caps: { icon: 'wallet', accent: '#007aff', takeaway: 'Overage, bounded.' },
        scanning: { icon: 'scan', accent: '#5e5ce6', takeaway: 'Caught in flight.' },
        rules: { icon: 'list-checks', accent: '#5e5ce6', takeaway: 'Allow, deny, or ask.' },
        sandbox: { icon: 'lock', accent: '#5e5ce6', takeaway: 'Boxed in at the OS.' },
        subagents: { icon: 'bot', accent: '#32d74b', takeaway: 'Routine work, routed cheap.' },
        compression: { icon: 'fold', accent: '#32d74b', takeaway: 'Trimmed, never lost.' },
        codemode: { icon: 'braces', accent: '#32d74b', takeaway: 'Definitions out of context.' },
      };

      const P = new URLSearchParams(location.search);
      if (P.has('capture')) document.documentElement.classList.add('capture');
      const slug = P.get('slug') && CARDS[P.get('slug')] ? P.get('slug') : 'compression';
      const card = CARDS[slug];

      document.getElementById('stage').style.setProperty('--accent', card.accent);
      document.getElementById('tile').innerHTML =
        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[card.icon]}</svg>`;
      document.getElementById('takeaway').textContent = card.takeaway;

      window.SENTINEL_BOOKEND = { durationMs: 4200 };
      setTimeout(() => {
        window.__animDone = true;
        document.documentElement.setAttribute('data-anim-done', '1');
      }, 3900);
    </script>
  </body>
</html>
