name: Notarize finalize (reusable)

# Staple the (already Accepted) notarized macOS artifacts, then publish the corrected
# auto-update manifest to the GitHub release and promote it. The release itself is the
# update channel: installed apps poll releases/latest/download/latest.json. Shared by two
# callers so the logic lives in one place:
#   - release.yml      — fast path, right after a short inline notarize-wait, when Apple
#                        finished quickly.
#   - notarize-poll.yml — scheduled path, when Apple finished a slow submission later.
# The CALLER must confirm notarization is Accepted before invoking this (this workflow only
# staples + publishes; it does not poll).
on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to finalize (e.g. v0.3.6)
        required: true
        type: string
      channel:
        description: Update channel (stable or staging). Staging never promotes the GitHub release, so its manifest is only ever attached to a draft.
        required: false
        default: stable
        type: string
  # Manual (re)finalize / recovery for a single tag: staple + manifest + promote.
  # Idempotent — re-stapling and re-promoting an already-finalized release is a no-op.
  # Use this to republish a release whose manifest step failed, once the cause is fixed.
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)finalize — staple + manifest + promote (e.g. v0.3.6)
        required: true
        type: string
      channel:
        description: Update channel (stable or staging). Staging never promotes the GitHub release.
        required: false
        default: stable
        type: string

permissions:
  contents: write

jobs:
  staple:
    name: Staple notarized macOS artifacts
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      # Stapling needs no Apple API key (xcrun stapler fetches the ticket anonymously by
      # cdhash); only the Tauri minisign key is needed, to re-sign the regenerated tarball.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download draft release macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-staple
          # Drafts are downloadable with the workflow token. macOS-only globs on
          # purpose: stapling is a macOS-only concept (xcrun stapler). The Linux and
          # Windows bundles need no staple; publish-manifest reads them straight from
          # the release.
          gh release download "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist-staple \
            --pattern '*.dmg' \
            --pattern '*.app.tar.gz' \
            --pattern '*.app.tar.gz.sig'
          echo "Downloaded:"; ls -1 dist-staple
      - name: Staple + re-sign updater artifacts
        run: bash scripts/notary-staple.sh dist-staple "${{ inputs.tag }}"

  # Promote LAST — only after publish-manifest has replaced latest.json on the release —
  # so the release never goes live with tauri-action's stale manifest (its darwin
  # signatures predate the staple re-sign), AND this job can't race publish-manifest's
  # download of the (still-draft) release by tag (that race 404'd "release not found" when
  # the two ran in parallel). Stays a draft if publish-manifest failed.
  publish-release:
    name: Publish GitHub Release
    needs: [staple, publish-manifest]
    # Staging is a throwaway dry-run channel: assemble its manifest but NEVER promote the
    # GitHub release out of draft. Only stable promotes — and only a PUBLISHED release can
    # become releases/latest, so drafts never reach the updater endpoint.
    if: ${{ inputs.channel == 'stable' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Clear notary markers + promote draft to published
        run: |
          set -euo pipefail
          # Remove the pending-notarization marker assets so the scheduled notarize-poll
          # workflow stops treating this release as pending, then publish it.
          for a in $(gh release view "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" --json assets \
                      --jq '.assets[].name | select(startswith("notary-") and endswith(".json"))'); do
            gh release delete-asset "${{ inputs.tag }}" "$a" --yes --repo "$GITHUB_REPOSITORY" || true
          done
          gh release edit "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" --draft=false

  # Assembles the authoritative updater manifest and attaches it to the GitHub release.
  # The release IS the update channel now that the repo is public: installed apps poll
  # releases/latest/download/latest.json, whose per-platform URLs point back at this
  # release's assets. tauri-action's auto-generated latest.json can't be used as-is —
  # each matrix leg only knows its own platform, and the darwin signatures it recorded
  # predate the staple re-sign — so this job rebuilds the manifest from the final
  # artifacts and replaces the release asset.
  publish-manifest:
    name: Publish updater manifest to the release
    needs: [staple]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # contents must be WRITE even though this job mostly reads: draft releases are
      # invisible to a contents:read token (drafts require push-level access), and this
      # job always downloads from a still-draft release because publish-release promotes
      # LAST. With read, `gh release download` fails with "release not found" (bit the
      # first scheduled-poller finalize of v0.4.0).
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ inputs.tag }}
    steps:
      # Needed for scripts/assemble-latest-json.mjs below (the job used to inline the
      # manifest assembly and ran checkout-free).
      - uses: actions/checkout@v4

      - name: Download updater artifacts from the release
        run: |
          set -euo pipefail
          mkdir -p dist-updater
          # Explicit per-bundle globs: .dmg, notary-*.json, and tauri-action's
          # release-attached latest.json must never land in dist-updater (every file
          # here feeds the manifest assembler).
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist-updater \
            --pattern '*.app.tar.gz' \
            --pattern '*.app.tar.gz.sig' \
            --pattern '*.AppImage' \
            --pattern '*.AppImage.sig' \
            --pattern '*.deb' \
            --pattern '*.deb.sig' \
            --pattern '*.rpm' \
            --pattern '*.rpm.sig' \
            --pattern '*-setup.exe' \
            --pattern '*-setup.exe.sig' \
            --pattern '*.msi' \
            --pattern '*.msi.sig'
          echo "Downloaded:"; ls -1 dist-updater

      - name: Assemble latest.json
        run: |
          set -euo pipefail
          # Builds the v2 dynamic manifest covering every platform (bundle-suffixed
          # keys + bare fallbacks) and fails loudly if any expected artifact or .sig
          # is missing — see the script's doc comment for the key scheme. URLs point
          # at this release's own assets.
          UPDATER_ARTIFACT_BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG" \
            node scripts/assemble-latest-json.mjs dist-updater "${TAG#v}"

      - name: Replace latest.json on the release
        run: |
          set -euo pipefail
          # --clobber replaces tauri-action's auto-generated manifest (stale darwin
          # signatures after the staple re-sign; single-platform coverage per leg)
          # with the authoritative merged one.
          gh release upload "$TAG" dist-updater/latest.json --clobber --repo "$GITHUB_REPOSITORY"
