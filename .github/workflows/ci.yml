name: CI

on:
  push:
    branches: [main]
    # No branch protection on `main` requires this workflow, so skipping
    # docs-only commits doesn't strand any PR on a missing required check.
    # (Verified via `gh api repos/.../branches/main/protection` → 404.)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GitHub release notes are generated verbatim from commit messages
  # (scripts/release-notes.mjs), so the conventional-commit shape is a
  # release-quality gate, not a style nit. Dependency-free node script —
  # deliberately no LLM and no commitlint package.
  commit-lint:
    name: Commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # The lint walks base..HEAD, so it needs more than the default
          # shallow single-commit checkout.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint commit messages (release notes are generated from them)
        run: node scripts/commit-lint.mjs "origin/${{ github.base_ref }}" HEAD

  lint-test:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Must match the local pnpm version that produced pnpm-lock.yaml —
      # pnpm 10 writes `pnpmfileChecksum` into the lockfile, and pnpm 9
      # rejects it with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH. Keep this in
      # sync with release.yml if you bump either.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build outputs (dist/) + the platform-built better-sqlite3 binary are
      # deterministic for a given source tree + lockfile. Cache so the `e2e`
      # job downstream can hit the same key and skip rebuilding. Bump the
      # `build-v1-` prefix to invalidate.
      - name: Cache built packages + better-sqlite3 binary
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/daemon/dist
            packages/test-harness/dist
            node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build
          key: build-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/shared/src/**', 'packages/daemon/src/**', 'packages/test-harness/src/**') }}

      - name: Build better-sqlite3 native module
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # Build shared first so its dist/ (types + JS) exists on disk — daemon
      # imports @sentinel/shared via package.json's `types` / `main`
      # which point at ./dist. Using tsc --noEmit on shared would typecheck
      # it but produce no dist, so the daemon typecheck then fails with
      # TS2307 "Cannot find module '@sentinel/shared'".
      - name: Build shared (emits dist/ for daemon typecheck)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/shared run build

      # Same rule as shared above: test-harness exposes types via dist/
      # (package.json `types` → ./dist/index.d.ts). Daemon's
      # *.integration.test.ts files import from @sentinel/test-harness,
      # so the daemon build step below will fail with TS2307 unless dist
      # exists on disk.
      - name: Build test-harness (emits dist/ for daemon build)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/test-harness run build

      # Daemon build serves dual purpose: typecheck (tsc fails on type
      # errors regardless of --noEmit) AND populates packages/daemon/dist
      # for the downstream e2e job's build-output cache hit.
      - name: Build daemon
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/daemon run build

      - name: Lint
        run: pnpm exec eslint packages/daemon/src packages/shared/src

      - name: Format check
        run: pnpm run format:check

      - name: Mock budget check
        run: node scripts/mock-budget.mjs

      - name: Detector ReDoS check
        run: node scripts/check-detector-regex.mjs

      # Asserts the committed icon.ico keeps the full DPI ladder with the
      # 256px PNG entry FIRST (tauri #14596 renders the runtime window icon
      # from entries()[0]). Re-running `tauri icon` would silently ship the
      # 32-first, 6-entry ladder and reintroduce pixelated Windows icons.
      - name: Windows icon ladder check
        run: node scripts/generate-ico.mjs --verify

      - name: Fake API contract check
        run: pnpm exec vitest run packages/test-harness/src/fake-anthropic.contract.test.ts

      - name: Test with coverage (fails the job on threshold regression)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Mirror the lint-test cache step — same key, so a successful lint-test
      # populates the entry and this job hits and skips the rebuilds below.
      - name: Cache built packages + better-sqlite3 binary
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/daemon/dist
            packages/test-harness/dist
            node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build
          key: build-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/shared/src/**', 'packages/daemon/src/**', 'packages/test-harness/src/**') }}

      - name: Build better-sqlite3 native module
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      - name: Build shared
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/shared run build

      - name: Build daemon
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/daemon run build

      - name: Build test-harness
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @sentinel/test-harness run build

      # No `playwright install` step on purpose. cdn.playwright.dev has
      # repeatedly stalled on GitHub runners (the chromium zip reaches 100%,
      # then the follow-up artifact fetch hangs; bounded retries all stalled
      # identically, so it's a deterministic CDN-path failure). The runner
      # image ships Google Chrome, and PLAYWRIGHT_CHANNEL=chrome (see
      # e2e/playwright.config.ts) makes the suite launch it directly —
      # nothing to download, nothing to stall.
      - name: Run Playwright
        env:
          PLAYWRIGHT_CHANNEL: chrome
        run: pnpm --filter @sentinel/app run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
