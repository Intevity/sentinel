name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Must match the local pnpm version that produced pnpm-lock.yaml —
      # pnpm 10 writes `pnpmfileChecksum` into the lockfile, and pnpm 9
      # rejects it with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH. Keep this in
      # sync with release.yml if you bump either.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native module
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # Build shared first so its dist/ (types + JS) exists on disk — daemon
      # imports @claude-sentinel/shared via package.json's `types` / `main`
      # which point at ./dist. Using tsc --noEmit on shared would typecheck
      # it but produce no dist, so the daemon typecheck then fails with
      # TS2307 "Cannot find module '@claude-sentinel/shared'".
      - name: Build shared (emits dist/ for daemon typecheck)
        run: pnpm --filter @claude-sentinel/shared run build

      # Same rule as shared above: test-harness exposes types via dist/
      # (package.json `types` → ./dist/index.d.ts). Daemon's
      # *.integration.test.ts files import from @claude-sentinel/test-harness,
      # so the daemon typecheck step below will fail with TS2307 unless dist
      # exists on disk.
      - name: Build test-harness (emits dist/ for daemon typecheck)
        run: pnpm --filter @claude-sentinel/test-harness run build

      - name: Typecheck daemon
        run: pnpm --filter @claude-sentinel/daemon exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint packages/daemon/src packages/shared/src

      - name: Format check
        run: pnpm run format:check

      - name: Mock budget check
        run: node scripts/mock-budget.mjs

      - name: Detector ReDoS check
        run: node scripts/check-detector-regex.mjs

      - name: Fake API contract check
        run: pnpm exec vitest run packages/test-harness/src/fake-anthropic.contract.test.ts

      - name: Test with coverage (fails the job on threshold regression)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native module
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      - name: Build shared
        run: pnpm --filter @claude-sentinel/shared run build

      - name: Build daemon
        run: pnpm --filter @claude-sentinel/daemon run build

      - name: Build test-harness
        run: pnpm --filter @claude-sentinel/test-harness run build

      - name: Install Playwright browsers
        run: pnpm --filter @claude-sentinel/app exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm --filter @claude-sentinel/app run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
