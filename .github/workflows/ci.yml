name: CI

on:
  push:
    branches: [main]
    # No branch protection on `main` requires this workflow, so skipping
    # docs-only commits doesn't strand any PR on a missing required check.
    # (Verified via `gh api repos/.../branches/main/protection` → 404.)
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Must match the local pnpm version that produced pnpm-lock.yaml —
      # pnpm 10 writes `pnpmfileChecksum` into the lockfile, and pnpm 9
      # rejects it with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH. Keep this in
      # sync with release.yml if you bump either.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build outputs (dist/) + the platform-built better-sqlite3 binary are
      # deterministic for a given source tree + lockfile. Cache so the `e2e`
      # job downstream can hit the same key and skip rebuilding. Bump the
      # `build-v1-` prefix to invalidate.
      - name: Cache built packages + better-sqlite3 binary
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/daemon/dist
            packages/test-harness/dist
            node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build
          key: build-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/shared/src/**', 'packages/daemon/src/**', 'packages/test-harness/src/**') }}

      - name: Build better-sqlite3 native module
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # Build shared first so its dist/ (types + JS) exists on disk — daemon
      # imports @claude-sentinel/shared via package.json's `types` / `main`
      # which point at ./dist. Using tsc --noEmit on shared would typecheck
      # it but produce no dist, so the daemon typecheck then fails with
      # TS2307 "Cannot find module '@claude-sentinel/shared'".
      - name: Build shared (emits dist/ for daemon typecheck)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/shared run build

      # Same rule as shared above: test-harness exposes types via dist/
      # (package.json `types` → ./dist/index.d.ts). Daemon's
      # *.integration.test.ts files import from @claude-sentinel/test-harness,
      # so the daemon build step below will fail with TS2307 unless dist
      # exists on disk.
      - name: Build test-harness (emits dist/ for daemon build)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/test-harness run build

      # Daemon build serves dual purpose: typecheck (tsc fails on type
      # errors regardless of --noEmit) AND populates packages/daemon/dist
      # for the downstream e2e job's build-output cache hit.
      - name: Build daemon
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/daemon run build

      - name: Lint
        run: pnpm exec eslint packages/daemon/src packages/shared/src

      - name: Format check
        run: pnpm run format:check

      - name: Mock budget check
        run: node scripts/mock-budget.mjs

      - name: Detector ReDoS check
        run: node scripts/check-detector-regex.mjs

      - name: Fake API contract check
        run: pnpm exec vitest run packages/test-harness/src/fake-anthropic.contract.test.ts

      - name: Test with coverage (fails the job on threshold regression)
        run: pnpm exec vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Mirror the lint-test cache step — same key, so a successful lint-test
      # populates the entry and this job hits and skips the rebuilds below.
      - name: Cache built packages + better-sqlite3 binary
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/shared/dist
            packages/daemon/dist
            packages/test-harness/dist
            node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build
          key: build-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/shared/src/**', 'packages/daemon/src/**', 'packages/test-harness/src/**') }}

      - name: Build better-sqlite3 native module
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      - name: Build shared
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/shared run build

      - name: Build daemon
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/daemon run build

      - name: Build test-harness
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @claude-sentinel/test-harness run build

      # Cache the downloaded browsers so a cdn.playwright.dev stall can't block CI on a hit
      # (a stalled download with no timeout previously hung this step the full 30 min).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        # Per-attempt timeout + retry so a CDN stall fails fast and self-recovers instead of
        # hanging until the job timeout. On a cache hit the browser download is skipped.
        timeout-minutes: 12
        run: |
          # System deps (apt) — fast, no retry needed.
          pnpm --filter @claude-sentinel/app exec playwright install-deps chromium
          # Browser binaries (cdn.playwright.dev) — bounded retries instead of an open-ended hang.
          for i in 1 2 3; do
            if timeout 240 pnpm --filter @claude-sentinel/app exec playwright install chromium; then
              exit 0
            fi
            echo "::warning::playwright browser download attempt $i stalled or failed; retrying…"
            sleep 5
          done
          echo "::error::playwright browser download failed after 3 attempts (cdn.playwright.dev)"
          exit 1

      - name: Run Playwright
        run: pnpm --filter @claude-sentinel/app run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
