name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual staging dry-run: publish a fully-signed/notarized candidate to the `staging`
  # channel (S3 `staging/` prefix + a DRAFT release that is never promoted) to validate the
  # update pipeline without touching `stable`. Tag pushes are unaffected and always publish
  # `stable`. See the staging dry-run runbook.
  workflow_dispatch:
    inputs:
      channel:
        description: Channel to publish (staging = dry-run, never promoted; stable = real publish)
        required: true
        default: staging
        type: choice
        options:
          - staging
          - stable
      version:
        description: Version tag to build + stamp (e.g. v0.5.1); required for manual runs
        required: true
        type: string

# A re-push of the same tag is rare but happens (e.g., draft release re-cut).
# Deduplicate retries on the same tag, but never cancel a mid-flight macOS
# notarize — that wastes 10x ubuntu-equivalent minutes.
concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # the reusable finalize workflow's S3 publish assumes the AWS role via OIDC

jobs:
  # Release notes, generated mechanically from the conventional commits
  # between the previous tag and this one (scripts/release-notes.mjs — pure
  # git parsing, no LLM). Runs once; every build-tauri matrix leg passes the
  # same body to tauri-action, so whichever leg creates the draft release
  # stamps the notes onto it.
  prepare-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The generator diffs against the previous semver tag.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Build notes from conventional commits
        id: notes
        env:
          # On a manual staging dispatch the ref is a branch, not a tag, and
          # release-notes.mjs only accepts <vX.Y.Z|HEAD> — so pass HEAD (it diffs from the
          # last tag to current HEAD; the notes are irrelevant for the never-promoted
          # staging draft). Tag pushes still pass the real tag.
          NOTES_REF: ${{ github.event_name == 'workflow_dispatch' && 'HEAD' || github.ref_name }}
        run: |
          set -euo pipefail
          node scripts/release-notes.mjs "$NOTES_REF" | tee notes.md
          {
            echo 'notes<<NOTES_EOF'
            cat notes.md
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build Tauri app (${{ matrix.platform }})
    needs: [prepare-notes]
    runs-on: ${{ matrix.os }}
    # Run in the `release` GitHub Environment so the Windows leg's Azure OIDC token carries
    # the subject `repo:<owner>/<repo>:environment:release` — the federated credential in
    # the azure-terraform module is scoped to exactly that. Harmless for the macOS/Linux
    # legs: the environment has no protection rules and repo-level secrets/variables stay
    # accessible. (Create it once with: gh api -X PUT repos/<owner>/<repo>/environments/release)
    environment: release
    # macOS notarization is NO LONGER awaited here: this leg signs the bundle and submits
    # to Apple's notary WITHOUT waiting (see the "Submit to notary" step), then exits. The
    # queue wait is paid on the 1x ubuntu `notarize-wait` job and stapling happens on the
    # short `notarize-finalize` macOS job, so the 10x build leg never blocks on Apple. 30
    # min comfortably covers build + submit on every platform.
    timeout-minutes: 30
    # Single source of truth for channel + version across this job's steps. Tag pushes
    # always publish `stable`; a manual workflow_dispatch can target `staging`.
    env:
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
      RELEASE_TAG: ${{ inputs.version || github.ref_name }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            args: --target aarch64-apple-darwin
          - os: macos-latest
            platform: macos-x64
            args: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            platform: linux-x64
            args: ''
          - os: windows-latest
            platform: windows-x64
            args: ''

    steps:
      - uses: actions/checkout@v4

      # Stamp the tag's version into tauri.conf.json + Cargo.toml so the
      # bundle's `productVersion` (and therefore the artifact filenames
      # like `Claude.Sentinel_0.3.1_aarch64.dmg`) match the tag instead
      # of whatever stale `0.1.0` the repo carries. Runs in every matrix
      # leg so each platform builds against the same patched manifest.
      # RELEASE_TAG is the pushed tag, or the workflow_dispatch `version` input on a
      # manual run; the validation below fails the leg loudly on anything not in
      # `vX.Y.Z` form rather than silently shipping a misnamed bundle.
      - name: Sync version from tag
        shell: bash
        env:
          # Public HTTPS base that maps to the S3 bucket root (or a CloudFront/custom
          # domain in front of it), e.g. https://<bucket>.s3.<region>.amazonaws.com or
          # https://dl.example.com. Set as a repo variable (Settings → Secrets and
          # variables → Actions → Variables). The same base is used by the
          # publish-updates job, so the endpoint baked into the binary and the location
          # latest.json is uploaded to can never drift. When unset, the committed
          # placeholder stays in place — the build still succeeds, but in-app updates
          # won't resolve until the variable is set and a release is published.
          UPDATER_PUBLIC_BASE: ${{ vars.UPDATER_PUBLIC_BASE }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$RELEASE_TAG" ]]; then
            echo "::error::Tag '$RELEASE_TAG' is not in the expected 'vX.Y.Z' form" >&2
            exit 1
          fi
          echo "Stamping version=$VERSION into tauri.conf.json + Cargo.toml"

          # tauri.conf.json — bundle metadata + artifact name source. Also stamps the
          # updater endpoint as <base>/stable/latest.json when UPDATER_PUBLIC_BASE is
          # set (left as the committed placeholder otherwise).
          node -e "
            const fs = require('fs');
            const p = 'packages/app/src-tauri/tauri.conf.json';
            const json = JSON.parse(fs.readFileSync(p, 'utf8'));
            json.version = process.argv[1];
            const base = (process.env.UPDATER_PUBLIC_BASE || '').replace(/\/+\$/, '');
            if (base) {
              json.plugins.updater.endpoints = [base + '/' + (process.env.RELEASE_CHANNEL || 'stable') + '/latest.json'];
            }
            fs.writeFileSync(p, JSON.stringify(json, null, 2) + '\n');
          " "$VERSION"

          # Cargo.toml — only the [package] section's version, not any
          # dependency that happens to have its own `version = "..."`.
          # `sed -i.bak` is the portable form (both GNU and BSD sed).
          sed -i.bak -E '/^\[package\]/,/^\[/ s/^version = ".*"/version = "'"$VERSION"'"/' \
            packages/app/src-tauri/Cargo.toml
          rm -f packages/app/src-tauri/Cargo.toml.bak

          echo "--- tauri.conf.json ---"
          grep '"version"' packages/app/src-tauri/tauri.conf.json | head -1
          echo "--- Cargo.toml ---"
          # awk is portable across GNU + BSD runners; the previous
          # `sed -n '/range/{/.../p}'` brace-form is GNU-only and BSD sed
          # (macOS) fails with "extra characters at end of p command",
          # which is what broke v0.3.2's release run.
          awk '/^\[package\]/{p=1;next} /^\[/{p=0} p && /^version = /{print; exit}' \
            packages/app/src-tauri/Cargo.toml

      # Must match the pnpm version that produced pnpm-lock.yaml (pnpm 10
      # writes `pnpmfileChecksum` into the lockfile, which pnpm 9 rejects).
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x64' && 'x86_64-apple-darwin' || '' }}

      # Cache ~/.cargo/{registry,git} + packages/app/src-tauri/target keyed on
      # Cargo.lock + the matrix triple. Saves ~5–10 min per leg on a hit;
      # the macOS legs bill at 10x so the effective savings is larger.
      # Bump the key prefix (e.g. tauri-release-v2) to invalidate.
      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target
          key: ${{ matrix.platform }}
          shared-key: tauri-release

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native module
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # beforeBuildCommand in tauri.conf.json compiles the daemon (tsc) and
      # then runs build:sidecar to produce the platform binary. That binary is
      # placed in packages/app/src-tauri/binaries/ and bundled into the app by
      # the Tauri build step below.

      # Prepare macOS signing: validate secrets, import the Developer ID cert into a
      # dedicated, unlocked, search-listed keychain, and stage the notarization key.
      # The cert must be resident BEFORE the build because build-sidecar.mjs signs the
      # Node daemon sidecar inside beforeBuildCommand (Tauri does not sign externalBin —
      # tauri-apps/tauri#11992), which runs before the Tauri CLI would import a cert
      # itself — hence the earlier "specified item could not be found in the keychain".
      # We import exactly once and the Build step omits APPLE_CERTIFICATE, so there is a
      # single identity (a second import makes `codesign --sign <name>` ambiguous);
      # Tauri signs via APPLE_SIGNING_IDENTITY against this keychain. macOS-only.
      - name: Prepare Apple signing + notarization
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          # Fail fast with one clear message if any required Apple secret is missing —
          # signing is mandatory (a macOS auto-update can only install a notarized
          # bundle), so a half-configured or unsigned release should never ship.
          missing=()
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_CONTENT; do
            [[ -z "${!v:-}" ]] && missing+=("$v")
          done
          if (( ${#missing[@]} )); then
            echo "::error::Missing Apple secret(s): ${missing[*]}. Set all six (see README → Required repository secrets) before tagging a macOS release." >&2
            exit 1
          fi

          # Import the Developer ID cert into a dedicated keychain. set-key-partition-list
          # lets codesign use the key non-interactively; list-keychains -s puts our
          # keychain on the search path so `codesign --sign "<identity>"` resolves by name.
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" -t cert -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          # Fail loudly here (cheap) rather than deep in the build if the import didn't take.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application" \
            || { echo "::error::No Developer ID Application identity in the keychain after import." >&2; exit 1; }

          # notarytool needs the App Store Connect key as a file on disk; the secret
          # holds its base64. Written under RUNNER_TEMP, never the workspace.
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey.p8"

      # ── Windows Authenticode signing (Azure Trusted/Artifact Signing, OIDC) ──────────
      # Mirrors the macOS prep above and, like it, runs BEFORE the build: build-sidecar.mjs
      # (in beforeBuildCommand) signs the daemon sidecar, which Tauri's signCommand never
      # touches (externalBin is not signed — tauri-apps/tauri#11992). Authentication is pure
      # OIDC — azure/login leaves an `az` session that the `sign` tool's DefaultAzureCredential
      # consumes, so there is NO client secret anywhere. Entirely gated on the AZURE_* repo
      # variables (set them from the azure-terraform module's outputs); when any is unset,
      # both steps skip and the Windows leg builds UNSIGNED (forks/dev degrade gracefully).
      - name: Azure login (OIDC) for code signing
        if: runner.os == 'Windows' && vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_TS_ENDPOINT != '' && vars.AZURE_TS_ACCOUNT != '' && vars.AZURE_TS_PROFILE != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          # The signer holds only a resource-scoped role on the signing account (no
          # subscription-level RBAC), and the signing token is acquired against that
          # resource — so don't let `az account set` hard-fail the login on a principal
          # with no subscription visibility.
          allow-no-subscriptions: true

      - name: Prepare Windows signing (Trusted/Artifact Signing)
        if: runner.os == 'Windows' && vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_TS_ENDPOINT != '' && vars.AZURE_TS_ACCOUNT != '' && vars.AZURE_TS_PROFILE != ''
        shell: bash
        env:
          AZURE_TS_ENDPOINT: ${{ vars.AZURE_TS_ENDPOINT }}
          AZURE_TS_ACCOUNT: ${{ vars.AZURE_TS_ACCOUNT }}
          AZURE_TS_PROFILE: ${{ vars.AZURE_TS_PROFILE }}
        run: |
          set -euo pipefail
          # Microsoft's `sign` tool (dotnet/sign): a per-file Authenticode signer that signs
          # via Azure Trusted/Artifact Signing using DefaultAzureCredential — which picks up
          # the az session left by azure/login above, so no client secret is needed.
          dotnet tool install --global --prerelease sign
          if [[ ! -f "$HOME/.dotnet/tools/sign.exe" ]]; then
            echo "::error::sign tool not found at $HOME/.dotnet/tools/sign.exe after install" >&2
            exit 1
          fi
          # Tauri runs signCommand as a raw process (no shell), so cmd must be an absolute
          # path with forward slashes (Windows accepts them; backslashes break parsing).
          SIGN_EXE="$(cygpath -m "$HOME/.dotnet/tools/sign.exe")"
          echo "sign tool: $SIGN_EXE"

          # The trusted->artifact rename is mid-flight across Microsoft's tooling; the `sign`
          # subcommand and its long flags track it (`code artifact-signing --artifact-signing-*`
          # vs `code trusted-signing --trusted-signing-*`). Detect which the installed build
          # exposes so the pipeline survives the rename with no edit (cf. signer_role_name in
          # the azure-terraform module).
          help="$("$SIGN_EXE" code --help 2>&1 || true)"
          if printf '%s' "$help" | grep -q 'artifact-signing'; then
            sub='artifact-signing'
          else
            sub='trusted-signing'
          fi
          echo "sign subcommand: $sub"

          # Inject bundle.windows.signCommand (OBJECT form: each arg is passed verbatim to the
          # process, so `%1` as its OWN element substitutes correctly and the spaced
          # description needs no quoting — the failure mode in tauri-apps/tauri#11754 was
          # embedding %1 inside a combined arg). Injected only here in CI; the committed
          # tauri.conf.json stays clean so local `pnpm build:app` builds unsigned.
          SIGN_EXE="$SIGN_EXE" SUB="$sub" node -e '
            const fs = require("fs");
            const p = "packages/app/src-tauri/tauri.conf.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const sub = process.env.SUB;
            j.bundle.windows = j.bundle.windows || {};
            j.bundle.windows.signCommand = {
              cmd: process.env.SIGN_EXE,
              args: [
                "code", sub,
                "--" + sub + "-endpoint", process.env.AZURE_TS_ENDPOINT,
                "--" + sub + "-account", process.env.AZURE_TS_ACCOUNT,
                "--" + sub + "-certificate-profile", process.env.AZURE_TS_PROFILE,
                "-d", "Sentinel",
                "%1",
              ],
            };
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
            console.log("Patched signCommand:", JSON.stringify(j.bundle.windows.signCommand));
          '

          # Hand the same resolved signer + account to build-sidecar.mjs (beforeBuildCommand)
          # so it signs the daemon sidecar with the same tool + OIDC credential.
          {
            echo "AZURE_TS_ENDPOINT=$AZURE_TS_ENDPOINT"
            echo "AZURE_TS_ACCOUNT=$AZURE_TS_ACCOUNT"
            echo "AZURE_TS_PROFILE=$AZURE_TS_PROFILE"
            echo "SIGN_TOOL_PATH=$SIGN_EXE"
            echo "SIGN_SUBCOMMAND=$sub"
          } >> "$GITHUB_ENV"

      # Signing mechanisms here:
      #   1. The Developer ID identity imported above signs the .app and the
      #      already-signed sidecar (Gatekeeper). Tauri signs via APPLE_SIGNING_IDENTITY
      #      against that keychain; APPLE_CERTIFICATE is intentionally NOT passed.
      #   2. APPLE_API_* are intentionally WITHHELD from this step so tauri-action signs
      #      but does NOT notarize/staple — its notarize is a blocking `notarytool --wait`
      #      on this 10x runner. We submit no-wait in the next step and finalize on cheaper
      #      jobs (see notarize-wait / notarize-finalize below).
      #   3. TAURI_SIGNING_PRIVATE_KEY → signs the auto-updater artifacts
      #      (.app.tar.gz.sig / latest.json), NOT the .app bundle.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: packages/app
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Sentinel ${{ env.RELEASE_TAG }}
          releaseBody: ${{ needs.prepare-notes.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Verify the Windows artifacts actually carry an Authenticode signature. Tauri's
      # signCommand (app exe + installers) and build-sidecar.mjs (daemon .exe) both sign
      # INSIDE the build; a misconfiguration can leave an artifact unsigned while the build
      # still succeeds, surfacing only as a SmartScreen/AV warning on users' machines. This
      # mirrors the macOS `codesign --verify` guard: fail loudly on a clearly-unsigned
      # artifact, and surface the status of anything the runner can't fully chain-verify
      # (e.g. transient revocation-check hiccups) without false-failing the release.
      - name: Verify Windows Authenticode signatures
        if: runner.os == 'Windows' && vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_TS_ENDPOINT != '' && vars.AZURE_TS_ACCOUNT != '' && vars.AZURE_TS_PROFILE != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bundle = "packages/app/src-tauri/target/release/bundle"
          $targets = @()
          $targets += Get-ChildItem -Path "$bundle/nsis" -Filter '*-setup.exe' -ErrorAction SilentlyContinue
          $targets += Get-ChildItem -Path "$bundle/msi"  -Filter '*.msi'        -ErrorAction SilentlyContinue
          $targets += Get-ChildItem -Path "packages/app/src-tauri/binaries" -Filter 'sentinel-daemon-*.exe' -ErrorAction SilentlyContinue
          if ($targets.Count -eq 0) {
            Write-Error "No Windows artifacts (nsis *-setup.exe, msi *.msi, sidecar .exe) found to verify."
          }
          $unsigned = @()
          foreach ($f in $targets) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            Write-Host ("{0,-12} {1}" -f $sig.Status, $f.Name)
            if ($sig.Status -eq 'NotSigned') {
              $unsigned += $f.Name
            } elseif ($sig.Status -ne 'Valid') {
              Write-Warning ("{0}: Authenticode status '{1}' - {2}" -f $f.Name, $sig.Status, $sig.StatusMessage)
            }
          }
          if ($unsigned.Count -gt 0) {
            Write-Error ("Unsigned Windows artifact(s): {0}. Expected Azure Trusted Signing Authenticode signatures." -f ($unsigned -join ', '))
          }
          Write-Host "Windows Authenticode verification passed (no unsigned artifacts)."

      # Submit the signed .dmg to Apple's notary service WITHOUT waiting, then hand the
      # submission id to the notarize-wait job. tauri-action above signed the bundle but
      # (with APPLE_API_* withheld) did not notarize, so this 10x runner never blocks on
      # Apple's queue. Submitting the .dmg also notarizes the nested app's code identity,
      # which is what lets notarize-finalize staple both the dmg and the updater app.
      - name: Submit to notary (no wait)
        if: runner.os == 'macOS'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          ARCH: ${{ matrix.platform == 'macos-arm64' && 'aarch64' || 'x86_64' }}
        run: |
          set -euo pipefail
          dmg="$(find packages/app/src-tauri/target -path '*/release/bundle/dmg/*.dmg' -print -quit)"
          if [[ -z "$dmg" ]]; then
            echo "::error::No .dmg found to notarize under target/.../release/bundle/dmg/" >&2
            exit 1
          fi
          echo "Submitting $dmg to notary (no wait)…"
          id="$(xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" \
            --no-wait --output-format json \
            | node -pe 'JSON.parse(require("fs").readFileSync(0, "utf8")).id || ""')"
          if [[ -z "$id" ]]; then
            echo "::error::notarytool submit did not return a submission id" >&2
            exit 1
          fi
          echo "Notary submission id ($ARCH): $id"
          mkdir -p notary-out
          printf '{"arch":"%s","submissionId":"%s","dmg":"%s"}\n' \
            "$ARCH" "$id" "$(basename "$dmg")" > "notary-out/notary-$ARCH.json"

      - name: Attach notary submission id to the draft release
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Durable pending-notarization marker. Read by notarize-wait (this run) and, if
          # Apple is slow, by the scheduled notarize-poll workflow (a later run) — hence a
          # release asset, not a run-scoped workflow artifact. The per-arch filename keeps
          # the two macOS legs from clobbering each other.
          gh release upload "$RELEASE_TAG" notary-out/notary-*.json --clobber --repo "$GITHUB_REPOSITORY"

  # Short inline wait on Apple's notary queue (1x ubuntu) to catch the common
  # fast-notarization case so a typical release finalizes within its own run. If Apple is
  # slow this DEFERS (the poller exits 2, not a failure): the draft release keeps its
  # notary-*.json markers and the scheduled notarize-poll workflow finalizes it whenever
  # Apple completes — no held runner, no rebuild. A hard notarization failure (Invalid)
  # still fails loudly here.
  notarize-wait:
    name: Wait for Apple notarization (short)
    needs: [build-tauri]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      state: ${{ steps.poll.outputs.state }}
    env:
      RELEASE_TAG: ${{ inputs.version || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
      # ~20 min inline; longer waits hand off to notarize-poll.yml rather than hold a runner.
      NOTARY_POLL_TIMEOUT_MS: '1200000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Download notary submission ids from the draft release
        run: |
          set -euo pipefail
          mkdir -p notary-ids
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --dir notary-ids --pattern 'notary-*.json'
          ls -1 notary-ids
      - name: Poll notary (short), else defer to the scheduled poller
        id: poll
        run: |
          set +e
          node scripts/notary-poll.mjs notary-ids
          code=$?
          set -e
          case "$code" in
            0) echo "state=accepted" >> "$GITHUB_OUTPUT"
               echo "Accepted within the inline window." ;;
            2) echo "state=deferred" >> "$GITHUB_OUTPUT"
               echo "::notice::Notarization still pending; the scheduled notarize-poll workflow will finalize this release when Apple completes." ;;
            *) echo "state=failed" >> "$GITHUB_OUTPUT"
               echo "::error::Notarization failed (Invalid/Rejected or fatal error)."
               exit 1 ;;
          esac

  # Fast path: Apple accepted within the inline window, so staple + publish now. The same
  # reusable workflow is invoked by notarize-poll.yml for the slow path. Skipped when
  # notarize-wait deferred (the scheduled poller takes over) or failed.
  finalize:
    name: Finalize (staple + publish)
    needs: [notarize-wait]
    if: needs.notarize-wait.outputs.state == 'accepted'
    uses: ./.github/workflows/notarize-finalize.yml
    with:
      tag: ${{ inputs.version || github.ref_name }}
      channel: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'stable' }}
    secrets: inherit
