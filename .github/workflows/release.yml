name: Release

on:
  push:
    tags:
      - 'v*'

# A re-push of the same tag is rare but happens (e.g., draft release re-cut).
# Deduplicate retries on the same tag, but never cancel a mid-flight macOS
# notarize — that wastes 10x ubuntu-equivalent minutes.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri app (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            args: --target aarch64-apple-darwin
          - os: macos-latest
            platform: macos-x64
            args: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            platform: linux-x64
            args: ''
          - os: windows-latest
            platform: windows-x64
            args: ''

    steps:
      - uses: actions/checkout@v4

      # Must match the pnpm version that produced pnpm-lock.yaml (pnpm 10
      # writes `pnpmfileChecksum` into the lockfile, which pnpm 9 rejects).
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x64' && 'x86_64-apple-darwin' || '' }}

      # Cache ~/.cargo/{registry,git} + packages/app/src-tauri/target keyed on
      # Cargo.lock + the matrix triple. Saves ~5–10 min per leg on a hit;
      # the macOS legs bill at 10x so the effective savings is larger.
      # Bump the key prefix (e.g. tauri-release-v2) to invalidate.
      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target
          key: ${{ matrix.platform }}
          shared-key: tauri-release

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native module
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # beforeBuildCommand in tauri.conf.json compiles the daemon (tsc) and
      # then runs build:sidecar to produce the platform binary. That binary is
      # placed in packages/app/src-tauri/binaries/ and bundled into the app by
      # the Tauri build step below.
      # macOS builds ship unsigned for v0.1.x — users right-click → Open once
      # to bypass Gatekeeper. When we're ready for signed + notarized releases,
      # add back: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
      # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID (all populated with valid values —
      # an empty APPLE_CERTIFICATE secret makes tauri-action fail at keychain import).
      # TAURI_SIGNING_PRIVATE_KEY below is a different mechanism — it signs the
      # auto-updater's latest.json manifest, not the .app bundle.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/app
          tagName: ${{ github.ref_name }}
          releaseName: Claude Sentinel ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/jeffwooden/claude-sentinel/blob/main/CHANGELOG.md) for release notes.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub Release
    needs: [build-tauri]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Promote draft release to published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false
