name: Release

on:
  push:
    tags:
      - 'v*'

# A re-push of the same tag is rare but happens (e.g., draft release re-cut).
# Deduplicate retries on the same tag, but never cancel a mid-flight macOS
# notarize — that wastes 10x ubuntu-equivalent minutes.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri app (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            args: --target aarch64-apple-darwin
          - os: macos-latest
            platform: macos-x64
            args: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            platform: linux-x64
            args: ''
          - os: windows-latest
            platform: windows-x64
            args: ''

    steps:
      - uses: actions/checkout@v4

      # Stamp the tag's version into tauri.conf.json + Cargo.toml so the
      # bundle's `productVersion` (and therefore the artifact filenames
      # like `Claude.Sentinel_0.3.1_aarch64.dmg`) match the tag instead
      # of whatever stale `0.1.0` the repo carries. Runs in every matrix
      # leg so each platform builds against the same patched manifest.
      # The workflow trigger filter already guarantees `GITHUB_REF_NAME`
      # starts with `v`, so the prefix strip is safe; the `set -e` guard
      # makes a malformed value fail the leg loudly rather than silently
      # shipping a misnamed bundle.
      - name: Sync version from tag
        shell: bash
        env:
          # Public HTTPS base that maps to the S3 bucket root (or a CloudFront/custom
          # domain in front of it), e.g. https://<bucket>.s3.<region>.amazonaws.com or
          # https://dl.example.com. Set as a repo variable (Settings → Secrets and
          # variables → Actions → Variables). The same base is used by the
          # publish-updates job, so the endpoint baked into the binary and the location
          # latest.json is uploaded to can never drift. When unset, the committed
          # placeholder stays in place — the build still succeeds, but in-app updates
          # won't resolve until the variable is set and a release is published.
          UPDATER_PUBLIC_BASE: ${{ vars.UPDATER_PUBLIC_BASE }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not in the expected 'vX.Y.Z' form" >&2
            exit 1
          fi
          echo "Stamping version=$VERSION into tauri.conf.json + Cargo.toml"

          # tauri.conf.json — bundle metadata + artifact name source. Also stamps the
          # updater endpoint as <base>/stable/latest.json when UPDATER_PUBLIC_BASE is
          # set (left as the committed placeholder otherwise).
          node -e "
            const fs = require('fs');
            const p = 'packages/app/src-tauri/tauri.conf.json';
            const json = JSON.parse(fs.readFileSync(p, 'utf8'));
            json.version = process.argv[1];
            const base = (process.env.UPDATER_PUBLIC_BASE || '').replace(/\/+\$/, '');
            if (base) {
              json.plugins.updater.endpoints = [base + '/stable/latest.json'];
            }
            fs.writeFileSync(p, JSON.stringify(json, null, 2) + '\n');
          " "$VERSION"

          # Cargo.toml — only the [package] section's version, not any
          # dependency that happens to have its own `version = "..."`.
          # `sed -i.bak` is the portable form (both GNU and BSD sed).
          sed -i.bak -E '/^\[package\]/,/^\[/ s/^version = ".*"/version = "'"$VERSION"'"/' \
            packages/app/src-tauri/Cargo.toml
          rm -f packages/app/src-tauri/Cargo.toml.bak

          echo "--- tauri.conf.json ---"
          grep '"version"' packages/app/src-tauri/tauri.conf.json | head -1
          echo "--- Cargo.toml ---"
          # awk is portable across GNU + BSD runners; the previous
          # `sed -n '/range/{/.../p}'` brace-form is GNU-only and BSD sed
          # (macOS) fails with "extra characters at end of p command",
          # which is what broke v0.3.2's release run.
          awk '/^\[package\]/{p=1;next} /^\[/{p=0} p && /^version = /{print; exit}' \
            packages/app/src-tauri/Cargo.toml

      # Must match the pnpm version that produced pnpm-lock.yaml (pnpm 10
      # writes `pnpmfileChecksum` into the lockfile, which pnpm 9 rejects).
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x64' && 'x86_64-apple-darwin' || '' }}

      # Cache ~/.cargo/{registry,git} + packages/app/src-tauri/target keyed on
      # Cargo.lock + the matrix triple. Saves ~5–10 min per leg on a hit;
      # the macOS legs bill at 10x so the effective savings is larger.
      # Bump the key prefix (e.g. tauri-release-v2) to invalidate.
      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target
          key: ${{ matrix.platform }}
          shared-key: tauri-release

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build better-sqlite3 native module
        run: |
          cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3
          npm run build-release
        shell: bash

      # beforeBuildCommand in tauri.conf.json compiles the daemon (tsc) and
      # then runs build:sidecar to produce the platform binary. That binary is
      # placed in packages/app/src-tauri/binaries/ and bundled into the app by
      # the Tauri build step below.

      # Notarization uses an App Store Connect API key (.p8). The secret holds the
      # base64-encoded .p8 body; notarytool (via tauri-action) needs it as a file on
      # disk, so decode it here and expose the path. macOS-only — the other legs
      # neither sign nor notarize.
      - name: Prepare Apple signing + notarization
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          # Fail fast with one clear message if any required Apple secret is missing —
          # signing is mandatory now (a macOS auto-update can only install a notarized
          # bundle), so a half-configured or unsigned release should never ship.
          missing=()
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_CONTENT; do
            [[ -z "${!v:-}" ]] && missing+=("$v")
          done
          if (( ${#missing[@]} )); then
            echo "::error::Missing Apple secret(s): ${missing[*]}. Set all six (see README → Required repository secrets) before tagging a macOS release." >&2
            exit 1
          fi
          # notarytool needs the App Store Connect key as a file on disk; the secret
          # holds its base64. Written under RUNNER_TEMP, never the workspace.
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey.p8"

      # Two independent signing mechanisms run here:
      #   1. APPLE_CERTIFICATE / _PASSWORD / _SIGNING_IDENTITY  → Developer ID signing
      #      of the .app + nested sidecar (Gatekeeper). Hardened runtime + the
      #      entitlements.plist (allow-jit / disable-library-validation) let the pkg'd
      #      Node daemon survive the hardened runtime.
      #   2. APPLE_API_* → App Store Connect API key used by notarytool to notarize +
      #      staple the signed bundle.
      #   3. TAURI_SIGNING_PRIVATE_KEY → unrelated: signs the auto-updater artifacts
      #      (.app.tar.gz.sig / latest.json), NOT the .app bundle.
      # The APPLE_* env is set on every leg but only consumed on macOS; an EMPTY
      # APPLE_CERTIFICATE makes tauri-action fail at keychain import, so all six Apple
      # secrets must be populated before tagging a release.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
        with:
          projectPath: packages/app
          tagName: ${{ github.ref_name }}
          releaseName: Claude Sentinel ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Intevity/claude-sentinel/blob/main/CHANGELOG.md) for release notes.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish GitHub Release
    needs: [build-tauri]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Promote draft release to published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} --draft=false

  # Publishes the macOS auto-update channel: mirrors the signed updater bundles
  # (.app.tar.gz + .sig) to a public-read S3 bucket and writes the merged
  # latest.json the in-app updater polls. The source repo can stay private — only
  # these built artifacts are exposed, anonymously, so no token is embedded in the
  # app. (Linux/Windows auto-update can be added later by extending the glob +
  # platform map below.)
  #
  # SKIPPED until S3 is provisioned: `terraform apply` the terraform/ dir, then set the
  # repo variables it outputs (S3_BUCKET, AWS_REGION, UPDATER_PUBLIC_BASE, AWS_ROLE_ARN).
  # Auth is GitHub OIDC — no AWS secrets are stored. Until S3_BUCKET is set, the GitHub
  # release (publish-release) is the only channel and the binary keeps its placeholder
  # endpoint, so the updater simply finds nothing.
  publish-updates:
    name: Publish auto-update artifacts to S3
    needs: [build-tauri]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: vars.S3_BUCKET != ''
    permissions:
      contents: read
      id-token: write # mint the OIDC token used to assume the AWS role (no stored keys)
    env:
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_PREFIX: stable
      UPDATER_PUBLIC_BASE: ${{ vars.UPDATER_PUBLIC_BASE }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          # OIDC: assume the role provisioned in terraform/ (claude-sentinel-updates-publisher),
          # scoped to this repo's tag pushes. No long-lived AWS keys are stored.
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Download macOS updater artifacts from the release
        run: |
          set -euo pipefail
          mkdir -p dist-updater
          # Drafts are downloadable with the workflow token. Grab only the macOS
          # updater bundles + their detached minisign signatures (Linux .AppImage.tar.gz
          # and Windows .zip artifacts do not match '*.app.tar.gz').
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist-updater \
            --pattern '*.app.tar.gz' \
            --pattern '*.app.tar.gz.sig'
          echo "Downloaded:"; ls -1 dist-updater

      - name: Assemble latest.json
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Build the v2 dynamic manifest. Arch is derived from the filename so we
          # don't depend on Tauri's exact artifact-naming scheme; the signature field
          # is the literal contents of the companion .sig file (a minisign string).
          VERSION="$VERSION" node -e '
            const fs = require("fs"), path = require("path");
            const dir = "dist-updater", version = process.env.VERSION;
            const base = (process.env.UPDATER_PUBLIC_BASE || "").replace(/\/+$/, "");
            const prefix = process.env.S3_PREFIX;
            const platforms = {};
            for (const f of fs.readdirSync(dir)) {
              if (!f.endsWith(".app.tar.gz")) continue;
              const key = f.includes("aarch64") ? "darwin-aarch64"
                        : f.includes("x86_64") ? "darwin-x86_64"
                        : null;
              if (!key) throw new Error("cannot determine arch from " + f);
              const signature = fs.readFileSync(path.join(dir, f + ".sig"), "utf8").trim();
              platforms[key] = { signature, url: `${base}/${prefix}/${version}/${encodeURIComponent(f)}` };
            }
            if (!Object.keys(platforms).length) throw new Error("no .app.tar.gz updater artifacts found");
            const manifest = { version, notes: `Claude Sentinel ${version}`, pub_date: new Date().toISOString(), platforms };
            fs.writeFileSync(path.join(dir, "latest.json"), JSON.stringify(manifest, null, 2));
            console.log(JSON.stringify(manifest, null, 2));
          '

      - name: Upload to S3
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Versioned artifacts are immutable → cache forever. latest.json is the
          # mutable pointer every installed binary polls → near-zero cache so a new
          # release is picked up promptly. Bucket public-read is granted by bucket
          # policy (Object Ownership = bucket-owner-enforced); add `--acl public-read`
          # only if your bucket still uses ACLs.
          aws s3 cp dist-updater/ "s3://$S3_BUCKET/$S3_PREFIX/$VERSION/" \
            --recursive --exclude '*' --include '*.app.tar.gz' --include '*.app.tar.gz.sig' \
            --cache-control 'public, max-age=31536000, immutable'
          aws s3 cp dist-updater/latest.json "s3://$S3_BUCKET/$S3_PREFIX/latest.json" \
            --content-type application/json \
            --cache-control 'public, max-age=60, must-revalidate'
          echo "Published: $UPDATER_PUBLIC_BASE/$S3_PREFIX/latest.json"
